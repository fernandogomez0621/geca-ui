services:
  geca_db:
    image: postgres:16-alpine
    container_name: geca_db
    environment:
      POSTGRES_DB: geca_brands
      POSTGRES_USER: geca
      POSTGRES_PASSWORD: geca_secret
    ports:
      - "5433:5432"
    volumes:
      - geca_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geca -d geca_brands"]
      interval: 5s
      timeout: 5s
      retries: 5

  geca_backend:
    build: ./backend
    container_name: geca_backend
    environment:
      DATABASE_URL: postgresql://geca:geca_secret@geca_db:5432/geca_brands
      SECRET_KEY: geca-production-secret-change-this
      VIDEOS_DIR: /mnt/shared/videos
      FRAMES_DIR: /mnt/shared/frames
      AUDIO_DIR: /mnt/shared/audio
      WHISPER_URL: http://geca_whisper:8001
      SQLSERVER_HOST: 10.43.13.164
      SQLSERVER_PORT: "1433"
      SQLSERVER_DB: IAGECA
      SQLSERVER_USER: iacarga
      SQLSERVER_PASSWORD: IAGECA_2026
    ports:
      - "8000:8000"
    volumes:
      - /mnt/shared:/mnt/shared
    depends_on:
      geca_db:
        condition: service_healthy
    restart: unless-stopped

  geca_whisper:
    build: ./whisper
    container_name: geca_whisper
    environment:
      AUDIO_DIR: /mnt/shared/audio
    volumes:
      - /mnt/shared:/mnt/shared
      - whisper_models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  geca_frontend:
    build: ./frontend
    container_name: geca_frontend
    ports:
      - "3000:3000"
    depends_on:
      - geca_backend
    restart: unless-stopped

  geca_jupyter:
    image: quay.io/jupyter/pytorch-notebook:cuda12-pytorch-2.6.0
    container_name: geca_jupyter
    ports:
      - "8888:8888"
    volumes:
      - /mnt/shared:/home/jovyan/shared
      - jupyter_notebooks:/home/jovyan/work
    environment:
      MLFLOW_TRACKING_URI: http://geca_mlflow:5000
      MLFLOW_ARTIFACT_ROOT: /home/jovyan/shared/mlflow/artifacts
    command: start-notebook.py --NotebookApp.token='geca2026' --notebook-dir=/home/jovyan
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  geca_mlflow:
    image: python:3.11-slim
    container_name: geca_mlflow
    ports:
      - "5000:5000"
    volumes:
      - /mnt/shared/mlflow:/mlflow
    entrypoint: ["sh", "-c", "pip install mlflow==2.18.0 && mkdir -p /mlflow/artifacts && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root mlflow-artifacts:/artifacts --artifacts-destination /mlflow/artifacts --gunicorn-opts '--timeout 120 --workers 1'"]
    restart: unless-stopped

volumes:
  geca_db_data:
  whisper_models:
  jupyter_notebooks:

networks:
  default:
    name: cvat_cvat
    external: true
